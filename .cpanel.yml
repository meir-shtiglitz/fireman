---
deployment:
  tasks:
    # 1. Define specific paths for your account
    - export CPANEL_USER=n66cb45
    - export PUBLIC_HTML=/home/$CPANEL_USER/public_html
    - export API_ROOT=/home/$CPANEL_USER/api_server

    # 2. Deploy the Client (React/Vue Build)
    # We use rsync to ensure it's fast and doesn't delete your .htaccess
    - /usr/bin/rsync -avz client/build/ $PUBLIC_HTML/

    # 3. Deploy the Server (Node.js)
    - /usr/bin/rsync -avz --exclude 'node_modules' server/ $API_ROOT/

    # 4. Auto-Restart the Node.js App
    - /bin/mkdir -p $API_ROOT/tmp
    - /bin/touch $API_ROOT/tmp/restart.txt