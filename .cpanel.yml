deployment:
  tasks:
    # 1. Build everything in one go to catch errors early
    - export PATH=/opt/cpanel/ea-nodejs16/bin/:$PATH && export REACT_APP_API_URL="/api" && cd /home/n66cb45/fireman-deploy/client && npm install && npm run build

    # 2. Copy build contents to server root
    - /bin/cp -R /home/n66cb45/fireman-deploy/client/build/* /home/n66cb45/fireman-deploy/server/

    # 3. Final move and cleanup
    - /bin/cp -R /home/n66cb45/fireman-deploy/server/* /home/n66cb45/fireman-deploy/
    - /bin/rm -rf /home/n66cb45/fireman-deploy/client
    - /bin/rm -rf /home/n66cb45/fireman-deploy/server

    # 4. Restart
    - /bin/mkdir -p /home/n66cb45/fireman-deploy/tmp
    - /bin/touch /home/n66cb45/fireman-deploy/tmp/restart.txt
