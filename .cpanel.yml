deployment:
  tasks:
    # 1. Build and copy in one single execution line
    - export PATH=/opt/cpanel/ea-nodejs16/bin/:$PATH && export REACT_APP_API_URL="/api" && cd client && npm install && npm run build && cp -R build/* ../server/

    # 2. Move everything to the deployment root
    - /bin/cp -R /home/n66cb45/fireman-deploy/server/* /home/n66cb45/fireman-deploy/

    # 3. CRITICAL: Prevent the cleanup from deleting your new files
    # We only delete the client source, not the build files we just moved
    - /bin/rm -rf /home/n66cb45/fireman-deploy/client

    # 4. Restart the App
    - /bin/mkdir -p /home/n66cb45/fireman-deploy/tmp
    - /bin/touch /home/n66cb45/fireman-deploy/tmp/restart.txt
